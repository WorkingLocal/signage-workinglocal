services:
  xibo-cms:
    image: xibosignage/xibo-cms:latest
    restart: unless-stopped
    ports:
      - "9505:9505"
    environment:
      - MYSQL_HOST=xibo-db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=xibo
      - CMS_SERVER_NAME=${XIBO_SERVER_NAME}
      - CMS_USE_HTTPS=true
      - XMR_HOST=xibo-cms
    volumes:
      - xibo-library:/var/www/cms/library
      - xibo-backup:/var/www/backup
      # Working Local white-label theme (persistent over redeployments)
      - ./theme/config.php:/var/www/cms/web/theme/default/config.php:ro
      - ./theme/css/override.css:/var/www/cms/web/theme/default/css/override.css:ro
      - ./theme/css/dashboard.css:/var/www/cms/web/theme/default/css/dashboard.css:ro
      - ./theme/img/xibologo.png:/var/www/cms/web/theme/default/img/xibologo.png:ro
      - ./theme/img/favicon.ico:/var/www/cms/web/theme/default/img/favicon.ico:ro
    depends_on:
      - xibo-db

  xibo-db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=xibo
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - xibo-db:/var/lib/mysql

volumes:
  xibo-library:
  xibo-backup:
  xibo-db:
