services:
  cms-db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=cms
      - MYSQL_USER=cms
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    volumes:
      - xibo-db:/var/lib/mysql

  cms-xmr:
    image: ghcr.io/xibosignage/xibo-xmr:1.3
    restart: unless-stopped
    ports:
      - "9505:9505"

  cms-memcached:
    image: memcached:alpine
    restart: unless-stopped
    command: memcached -m 64

  cms-quickchart:
    image: ianw/quickchart
    restart: unless-stopped

  cms-web:
    image: ghcr.io/xibosignage/xibo-cms:release-4.4.3
    restart: unless-stopped
    environment:
      - MYSQL_HOST=cms-db
      - MYSQL_DATABASE=cms
      - MYSQL_USER=cms
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - XMR_HOST=cms-xmr
      - CMS_USE_MEMCACHED=true
      - MEMCACHED_HOST=cms-memcached
      - CMS_SERVER_NAME=${CMS_SERVER_NAME}
    volumes:
      - xibo-library:/var/www/cms/library
      - xibo-backup:/var/www/backup
      - xibo-custom-theme:/var/www/cms/web/theme/custom
    depends_on:
      - cms-db
      - cms-xmr
      - cms-memcached
      - cms-quickchart

volumes:
  xibo-db:
  xibo-library:
  xibo-backup:
  xibo-custom-theme:
