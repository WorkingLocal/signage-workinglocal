services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma-wl
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.uptime-wl.rule=Host(`uptime.workinglocal.be`)
      - traefik.http.routers.uptime-wl.entrypoints=https
      - traefik.http.routers.uptime-wl.tls=true
      - traefik.http.routers.uptime-wl.tls.certresolver=letsencrypt
      - traefik.http.services.uptime-wl.loadbalancer.server.port=3001
      - traefik.docker.network=coolify

volumes:
  uptime-kuma-data:

networks:
  coolify:
    external: true
